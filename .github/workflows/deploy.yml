name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chisaapi:${{ github.sha }} .

      - name: Push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chisaapi:${{ github.sha }}

      - name: Tag
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/chisaapi:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/chisaapi:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/chisaapi:latest
